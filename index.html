<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Интерактивный счетчик кликов с 3D эффектами, эффектами частиц в 3D и звуковым сопровождением.">
  <title>Космический Клик-Счетчик 3D</title>
  
  <!-- Подключение современных шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* Базовые стили и CSS переменные */
    :root {
      --bg-color: #05050c;
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-glow: rgba(127, 0, 255, 0.4);
      --secondary-glow: rgba(255, 0, 127, 0.4);
      
      --text-main: #ffffff;
      --text-muted: #8b8e9f;
      
      --gradient-primary: linear-gradient(135deg, #7f00ff, #ff007f);
      --gradient-btn-hover: linear-gradient(135deg, #8f1aff, #ff1a8f);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      perspective: 1000px;
    }

    /* Фоновые декоративные элементы (светящиеся сферы) */
    .bg-glow-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
      top: -10%;
      left: -10%;
      z-index: 1;
      filter: blur(60px);
      animation: float 25s infinite alternate;
    }

    .bg-glow-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--secondary-glow) 0%, rgba(0,0,0,0) 70%);
      bottom: -15%;
      right: -10%;
      z-index: 1;
      filter: blur(60px);
      animation: float 30s infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.1); }
    }

    /* Главный контейнер (Стеклянная карточка с поддержкой 3D) */
    .container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 50px 40px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
      z-index: 10;
      position: relative;
      
      /* Настройки для 3D наклона (Параллакс) */
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      transition: transform 0.15s ease-out, box-shadow 0.3s ease;
    }

    /* 3D Смещение для внутренних элементов для эффекта параллакса */
    .container h1 {
      transform: translateZ(40px);
      transition: transform 0.2s ease;
    }
    
    .container .subtitle {
      transform: translateZ(30px);
      transition: transform 0.2s ease;
    }
    
    .container .counter-wrapper {
      transform: translateZ(55px);
      transition: transform 0.2s ease;
    }
    
    .container .btn-container {
      transform: translateZ(45px);
      transition: transform 0.2s ease;
    }
    
    .container .badge {
      transform: translateZ(35px);
      transition: transform 0.2s ease;
    }

    /* Заголовок */
    h1 {
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Секция счетчика */
    .counter-wrapper {
      position: relative;
      margin-bottom: 40px;
      display: inline-block;
      transform-style: preserve-3d;
    }

    .counter-display {
      font-family: 'Space Grotesk', monospace;
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 40%, #8288af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
      transition: transform 0.1s ease;
      display: inline-block;
    }

    .counter-pulse {
      animation: pulse-num 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pulse-num {
      0% { transform: scale(1) translateZ(0); }
      50% { transform: scale(1.15) translateZ(20px); }
      100% { transform: scale(1) translateZ(0); }
    }

    /* 3D Стилизация кнопки */
    .btn-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transform-style: preserve-3d;
    }

    .btn-3d-wrap {
      position: relative;
      width: 100%;
      perspective: 600px;
      transform-style: preserve-3d;
    }

    .btn-main-container {
      position: relative;
      background: transparent;
      padding: 0;
      border: none;
      cursor: pointer;
      outline: none;
      width: 100%;
      transform-style: preserve-3d;
      transform: translateZ(20px);
      transition: transform 0.2s ease;
    }

    /* Тень 3D кнопки на плоскости */
    .btn-main-shadow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.5);
      transform: translateY(8px) translateZ(-15px);
      filter: blur(6px);
      transition: transform 0.2s ease;
    }

    /* Боковая 3D грань (толщина кнопки) */
    .btn-main-edge {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(
        to left,
        #4c0099 0%,
        #99004c 100%
      );
      transform: translateY(4px) translateZ(-8px);
      transition: transform 0.2s ease;
    }

    /* Лицевая часть кнопки */
    .btn-main-front {
      display: block;
      position: relative;
      padding: 20px 45px;
      border-radius: 20px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      background: var(--gradient-primary);
      transform: translateY(-6px) translateZ(0px);
      box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
      transition: transform 0.2s cubic-bezier(.3, .7, .4, 1), box-shadow 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Эффект свечения */
    .btn-main-front::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 20px;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Ховер эффекты (кнопка приподнимается над основанием) */
    .btn-main-container:hover .btn-main-front {
      transform: translateY(-10px) translateZ(15px);
      background: var(--gradient-btn-hover);
      box-shadow: 0 15px 30px rgba(255, 0, 127, 0.5), 0 0 15px rgba(127, 0, 255, 0.4);
    }
    .btn-main-container:hover .btn-main-front::after {
      opacity: 1;
    }
    .btn-main-container:hover .btn-main-shadow {
      transform: translateY(12px) translateZ(-25px);
      filter: blur(8px);
    }
    .btn-main-container:hover .btn-main-edge {
      transform: translateY(6px) translateZ(-12px);
    }

    /* Клик (кнопка вдавливается вниз) */
    .btn-main-container:active .btn-main-front {
      transform: translateY(2px) translateZ(-5px);
      box-shadow: 0 2px 5px rgba(255, 0, 127, 0.2);
      transition: transform 0.05s;
    }
    .btn-main-container:active .btn-main-shadow {
      transform: translateY(4px) translateZ(-10px);
      transition: transform 0.05s;
    }
    .btn-main-container:active .btn-main-edge {
      transform: translateY(3px) translateZ(-7px);
      transition: transform 0.05s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-muted);
      border-radius: 14px;
      padding: 12px 28px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Outfit', sans-serif;
      transform: translateZ(10px);
      letter-spacing: 0.5px;
    }

    .btn-reset:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
      transform: translateZ(15px) scale(1.03);
    }
    .btn-reset:active {
      transform: translateZ(5px) scale(0.98);
    }

    /* Ачивки / Достижения */
    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #ff007f;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* Canvas для 3D частиц */
    canvas#particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- Светящиеся сферы на заднем плане -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Холст для 3D взрывов частиц при клике -->
  <canvas id="particles"></canvas>

  <!-- Главное окно приложения -->
  <main class="container">
    <h1 id="app-title">Счетчик Кликов 3D</h1>
    <p class="subtitle" id="app-subtitle">Кликни по 3D кнопке и наблюдай космические эффекты!</p>
    
    <div class="counter-wrapper">
      <span id="counter" class="counter-display" aria-live="polite">0</span>
    </div>

    <div class="btn-container">
      <div class="btn-3d-wrap">
        <button id="click-btn" class="btn-main-container">
          <span class="btn-main-shadow"></span>
          <span class="btn-main-edge"></span>
          <span class="btn-main-front">КЛИКНУТЬ!</span>
        </button>
      </div>
      <button id="reset-btn" class="btn-reset">Сбросить прогресс</button>
    </div>

    <div>
      <span id="rank-badge" class="badge">Новичок</span>
    </div>
  </main>

  <script>
    // Инициализация элементов
    const container = document.querySelector('.container');
    const counterEl = document.getElementById('counter');
    const clickBtn = document.getElementById('click-btn');
    const resetBtn = document.getElementById('reset-btn');
    const rankBadge = document.getElementById('rank-badge');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    // Состояние приложения
    let count = 0;
    let particles = [];
    
    // Аудиоконтекст для синтеза звуков клика
    let audioCtx = null;

    // Массив достижений
    const RANKS = [
      { min: 0, text: 'Новичок', color: '#ff007f' },
      { min: 10, text: 'Клик-Энтузиаст', color: '#ff5500' },
      { min: 25, text: 'Быстрый Палец', color: '#ffaa00' },
      { min: 50, text: 'Мастер Нажатий', color: '#00ffaa' },
      { min: 100, text: 'Кликер-Полубог', color: '#00aaff' },
      { min: 250, text: 'Сверхзвуковой клик', color: '#aa00ff' },
      { min: 500, text: 'Повелитель Времени', color: '#ff00aa' }
    ];

    // Настройка размеров холста
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Интерактивный 3D наклон карточки при движении мыши
    document.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      
      // Вычисляем расстояние от центра карточки
      const cardCenterX = rect.left + rect.width / 2;
      const cardCenterY = rect.top + rect.height / 2;
      
      const mouseX = e.clientX - cardCenterX;
      const mouseY = e.clientY - cardCenterY;
      
      // Нормализуем наклон (максимальный угол наклона ~15 градусов)
      // Ограничим область активации наклона, чтобы он работал приятнее
      const distance = Math.sqrt(mouseX * mouseX + mouseY * mouseY);
      const maxDistance = 600; // Дистанция влияния мыши
      
      if (distance < maxDistance) {
        const factor = (maxDistance - distance) / maxDistance; // Сила наклона ослабевает вдали
        const rotateX = -(mouseY / rect.height) * 18 * factor;
        const rotateY = (mouseX / rect.width) * 18 * factor;
        
        container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      } else {
        container.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
      }
    });

    // Возврат карточки в исходное положение при уходе мыши
    document.addEventListener('mouseleave', () => {
      container.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
    });

    // Воспроизведение синтезированного звука клика
    function playClickSound() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const baseFreq = 220 + (count % 40) * 12;
        osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.0, audioCtx.currentTime + 0.08);

        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } catch (e) {
        console.warn('Audio synthesis support error:', e);
      }
    }

    // Класс частицы для анимации трехмерного взрыва (3D Particles)
    class Particle3D {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.z = 0; // Начинает в плоскости Z = 0
        
        // Вектор скорости в 3D (вылет "к зрителю" и "от зрителя" за счет Z)
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 3;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - (Math.random() * 3 + 2); // Небольшой толчок вверх
        this.vz = (Math.random() - 0.5) * 10; // Скорость движения по оси Z (к камере/от камеры)
        
        this.gravity = 0.2; // Сила притяжения
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01; // Скорость угасания
        
        // 3D Вращение
        this.rx = Math.random() * Math.PI;
        this.ry = Math.random() * Math.PI;
        this.rz = Math.random() * Math.PI;
        this.vrx = (Math.random() - 0.5) * 0.25;
        this.vry = (Math.random() - 0.5) * 0.25;
        this.vrz = (Math.random() - 0.5) * 0.25;
        
        this.baseSize = Math.random() * 10 + 4;
        
        // Цвета взрыва
        const colors = ['#7f00ff', '#ff007f', '#00ffaa', '#00aaff', '#ffffff', '#ffaa00'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.z += this.vz;
        
        this.vy += this.gravity;
        this.alpha -= this.decay;
        
        // Обновляем углы вращения вокруг осей X, Y, Z
        this.rx += this.vrx;
        this.ry += this.vry;
        this.rz += this.vrz;
      }

      draw() {
        // Проекция 3D в 2D (перспективное масштабирование)
        const fov = 350; // Фокусное расстояние
        const scale = fov / (fov + this.z);
        
        // Если частица улетела слишком далеко за камеру, не рисуем ее
        if (scale <= 0) return;
        
        const size = this.baseSize * scale;
        if (size <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        
        // Перемещаем холст к точке проекции частицы
        ctx.translate(this.x, this.y);
        
        // Имитация 3D вращения с помощью масштабирования по осям X и Y на основе косинуса/синуса углов вращения
        ctx.rotate(this.rz);
        ctx.scale(Math.cos(this.rx), Math.sin(this.ry));
        
        // Создание свечения частиц
        ctx.shadowBlur = 15 * scale;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        // Рисуем многоугольник/ромбик для визуализации вращения граней в 3D
        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.lineTo(size * 0.7, 0);
        ctx.lineTo(0, size);
        ctx.lineTo(-size * 0.7, 0);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
      }
    }

    // Создание взрыва 3D частиц
    function createExplosion(x, y) {
      for (let i = 0; i < 25; i++) {
        particles.push(new Particle3D(x, y));
      }
    }

    // Анимационный цикл частиц
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Сортировка частиц по глубине (Z), чтобы дальние рисовались первыми (Z-буфер)
      particles.sort((a, b) => b.z - a.z);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        
        if (p.alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Обновление звания/ранга
    function updateRank() {
      let currentRank = RANKS[0];
      for (let i = RANKS.length - 1; i >= 0; i--) {
        if (count >= RANKS[i].min) {
          currentRank = RANKS[i];
          break;
        }
      }
      
      rankBadge.textContent = currentRank.text;
      rankBadge.style.color = currentRank.color;
      rankBadge.style.borderColor = currentRank.color + '33';
      rankBadge.style.background = currentRank.color + '0f';
      rankBadge.style.boxShadow = `0 5px 15px ${currentRank.color}22`;
    }

    // Обработчик клика по 3D кнопке
    clickBtn.addEventListener('click', (e) => {
      count++;
      
      // Обновляем текст счетчика
      counterEl.textContent = count;
      
      // Запуск анимации пульсации счетчика
      counterEl.classList.remove('counter-pulse');
      void counterEl.offsetWidth; // Триггер перерисовки
      counterEl.classList.add('counter-pulse');

      // Звуковое сопровождение
      playClickSound();

      // Координаты для взрыва 3D частиц
      const rect = clickBtn.getBoundingClientRect();
      const x = e.clientX || rect.left + rect.width / 2;
      const y = e.clientY || rect.top + rect.height / 2;
      
      createExplosion(x, y);
      
      // Обновление ранга
      updateRank();
    });

    // Обработчик клика по кнопке сброса
    resetBtn.addEventListener('click', () => {
      count = 0;
      counterEl.textContent = count;
      updateRank();

      // Специфический нисходящий звук при сбросе
      if (audioCtx) {
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.frequency.setValueAtTime(320, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
          
          gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          
          osc.start();
          osc.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
          console.warn('Reset audio error:', e);        }
      }
    });
  </script>
</body>
</html>
