
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Упрощенная игра 2048 в 3D с реалистичными плитками-слайдерами, звуковыми эффектами и управлением свайпами.">
  <title>2048 3D Space Edition</title>
  
  <!-- Современные шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #030308;
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.06);
      --primary-glow: rgba(127, 0, 255, 0.3);
      --secondary-glow: rgba(0, 240, 255, 0.3);
      --text-main: #ffffff;
      --text-muted: #7e8299;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      perspective: 1200px;
    }

    /* Анимированный космический фон */
    .bg-glow-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--primary-glow) 0%, rgba(0,0,0,0) 70%);
      top: -15%;
      left: -10%;
      z-index: 1;
      filter: blur(50px);
      animation: float 25s infinite alternate;
    }

    .bg-glow-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--secondary-glow) 0%, rgba(0,0,0,0) 70%);
      bottom: -20%;
      right: -10%;
      z-index: 1;
      filter: blur(60px);
      animation: float 30s infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.05); }
    }

    /* Главный контейнер игры */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      z-index: 10;
      transform-style: preserve-3d;
      transform: perspective(1000px);
    }

    /* Шапка игры (Заголовок + Счета) */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      transform-style: preserve-3d;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #00f0ff, #7f00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transform: translateZ(30px);
    }

    .scores-container {
      display: flex;
      gap: 10px;
      transform: translateZ(30px);
    }

    .score-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 6px 14px;
      text-align: center;
      min-width: 65px;
    }

    .score-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .score-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
    }

    /* 3D Игровая Арена */
    .arena-3d {
      width: 100%;
      perspective: 1000px;
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
      transform-style: preserve-3d;
    }

    /* Сетка игрового поля */
    #grid-container {
      position: relative;
      width: 340px;
      height: 340px;
      background: rgba(10, 10, 20, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                  inset 0 0 15px rgba(0, 0, 0, 0.6);
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(20deg) rotateY(-12deg);
      transition: transform 0.15s ease-out;
      transform-origin: center center;
    }

    /* Фоновые ячейки сетки */
    .grid-cell {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    /* 3D Плитки (Кубики/Слябы) */
    .tile {
      position: absolute;
      width: 70px;
      height: 70px;
      transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: spawn 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes spawn {
      0% { transform: scale3d(0, 0, 0); }
      100% { transform: scale3d(1, 1, 1); }
    }

    /* Грани 3D-плитки */
    .tile-face {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      border-radius: 10px;
    }

    /* Передняя грань */
    .tile-front {
      width: 70px;
      height: 70px;
      left: 0;
      top: 0;
      transform: translateZ(8px);
      color: #fff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* Задняя грань */
    .tile-back {
      width: 70px;
      height: 70px;
      left: 0;
      top: 0;
      transform: translateZ(-8px) rotateY(180deg);
      background: rgba(0, 0, 0, 0.6);
    }

    /* Верхняя и Нижняя грани */
    .tile-top, .tile-bottom {
      width: 70px;
      height: 16px;
      left: 0;
      filter: brightness(0.6);
    }
    .tile-top { top: -8px; transform: rotateX(90deg); }
    .tile-bottom { bottom: -8px; transform: rotateX(-90deg); }

    /* Левая и Правая грани */
    .tile-left, .tile-right {
      width: 16px;
      height: 70px;
      top: 0;
      filter: brightness(0.75);
    }
    .tile-left { left: -8px; transform: rotateY(-90deg); }
    .tile-right { right: -8px; transform: rotateY(90deg); }

    /* --- Окраска и Glow плиток в зависимости от номинала --- */
    .tile-2 .tile-front { background: linear-gradient(135deg, #00f0ff, #0072ff); box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
    .tile-2 .tile-top { background: #00a2ac; }
    .tile-2 .tile-bottom { background: #0072b3; }
    .tile-2 .tile-left, .tile-2 .tile-right { background: #008794; }

    .tile-4 .tile-front { background: linear-gradient(135deg, #7f00ff, #ff00ff); box-shadow: 0 0 15px rgba(127, 0, 255, 0.4); }
    .tile-4 .tile-top { background: #5900b3; }
    .tile-4 .tile-bottom { background: #b300b3; }
    .tile-4 .tile-left, .tile-4 .tile-right { background: #7300cc; }

    .tile-8 .tile-front { background: linear-gradient(135deg, #ff007f, #ff0000); box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
    .tile-8 .tile-top { background: #b30059; }
    .tile-8 .tile-bottom { background: #b30000; }
    .tile-8 .tile-left, .tile-8 .tile-right { background: #cc0066; }

    .tile-16 .tile-front { background: linear-gradient(135deg, #ff6b00, #ffaa00); box-shadow: 0 0 15px rgba(255, 107, 0, 0.4); }
    .tile-16 .tile-top { background: #b34b00; }
    .tile-16 .tile-bottom { background: #b37700; }
    .tile-16 .tile-left, .tile-16 .tile-right { background: #cc5600; }

    .tile-32 .tile-front { background: linear-gradient(135deg, #00ffaa, #00aa55); box-shadow: 0 0 15px rgba(0, 255, 170, 0.4); }
    .tile-32 .tile-top { background: #00b377; }
    .tile-32 .tile-bottom { background: #00773c; }
    .tile-32 .tile-left, .tile-32 .tile-right { background: #00cc88; }

    .tile-64 .tile-front { background: linear-gradient(135deg, #ffe600, #ffaa00); box-shadow: 0 0 15px rgba(255, 230, 0, 0.4); }
    .tile-64 .tile-top { background: #b3a100; }
    .tile-64 .tile-bottom { background: #b37700; }
    .tile-64 .tile-left, .tile-64 .tile-right { background: #cca300; }

    .tile-128 .tile-front { background: linear-gradient(135deg, #d300c5, #7f00ff); box-shadow: 0 0 20px rgba(211, 0, 197, 0.5); font-size: 1.5rem; }
    .tile-128 .tile-top { background: #94008a; }
    .tile-128 .tile-bottom { background: #5900b3; }
    .tile-128 .tile-left, .tile-128 .tile-right { background: #b300a7; }

    .tile-256 .tile-front { background: linear-gradient(135deg, #ff0055, #ff00aa); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); font-size: 1.5rem; }
    .tile-256 .tile-top { background: #b3003b; }
    .tile-256 .tile-bottom { background: #b30077; }
    .tile-256 .tile-left, .tile-256 .tile-right { background: #cc0044; }

    .tile-512 .tile-front { background: linear-gradient(135deg, #00f5d4, #00bbf9); box-shadow: 0 0 20px rgba(0, 245, 212, 0.5); font-size: 1.5rem; }
    .tile-512 .tile-top { background: #00ab94; }
    .tile-512 .tile-bottom { background: #0082ae; }
    .tile-512 .tile-left, .tile-512 .tile-right { background: #00cca8; }

    .tile-1024 .tile-front { background: linear-gradient(135deg, #ff3300, #ff007f); box-shadow: 0 0 25px rgba(255, 51, 0, 0.6); font-size: 1.25rem; }
    .tile-1024 .tile-top { background: #b32400; }
    .tile-1024 .tile-bottom { background: #b30059; }
    .tile-1024 .tile-left, .tile-1024 .tile-right { background: #cc2900; }

    .tile-2048 .tile-front {
      background: linear-gradient(135deg, #ffd700, #ffe600);
      box-shadow: 0 0 35px rgba(255, 215, 0, 0.8);
      font-size: 1.25rem;
      animation: hyper-glow 2s infinite alternate;
    }
    .tile-2048 .tile-top { background: #cca300; }
    .tile-2048 .tile-bottom { background: #b3a100; }
    .tile-2048 .tile-left, .tile-2048 .tile-right { background: #e6c300; }

    @keyframes hyper-glow {
      0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
      100% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.9), 0 0 15px rgba(255, 255, 255, 0.5); }
    }

    /* Анимация слияния (Упругий 3D-пульс) */
    @keyframes merge-pulse {
      0% { transform: scale3d(1, 1, 1); }
      50% { transform: scale3d(1.18, 1.18, 1.45) translateZ(10px); }
      100% { transform: scale3d(1, 1, 1); }
    }
    .tile-merge-pulse {
      animation: merge-pulse 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Элементы управления игры */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      transform: translateZ(20px);
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      width: 100%;
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.02);
    }
    
    .btn-reset:active {
      transform: scale(0.98);
    }

    .hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 300;
      margin-top: 18px;
      letter-spacing: 0.5px;
      transform: translateZ(15px);
    }

    /* 3D Окно окончания игры (Game Over) */
    #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 10, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transform: translateZ(50px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hidden {
      display: none !important;
    }

    #game-over-screen h2 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff007f, #ff0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    #game-over-screen p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    #game-over-screen .btn-restart {
      background: linear-gradient(135deg, #00f0ff, #7f00ff);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3);
      transition: all 0.2s ease;
    }

    #game-over-screen .btn-restart:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 240, 255, 0.5);
    }
  </style>
</head>
<body>

  <!-- Декоративные космические сферы -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Контейнер игры -->
  <main class="game-card">
    <div class="game-header">
      <h1 id="app-title">2048 3D</h1>
      <div class="scores-container">
        <div class="score-box">
          <div class="score-title">Счет</div>
          <div id="current-score" class="score-value">0</div>
        </div>
        <div class="score-box">
          <div class="score-title">Рекорд</div>
          <div id="best-score" class="score-value">0</div>
        </div>
      </div>
    </div>

    <!-- 3D Арена с полем -->
    <div class="arena-3d">
      <div id="grid-container">
        <!-- 3D Оверлей окончания игры -->
        <div id="game-over-screen" class="hidden">
          <h2>Игра Окончена</h2>
          <p>Ваш результат: <span id="final-score">0</span></p>
          <button id="restart-btn-over" class="btn-restart">Играть снова</button>
        </div>

        <!-- Ячейки сетки (будут созданы с помощью JS) -->
      </div>
    </div>

    <div class="controls">
      <button id="reset-btn" class="btn-reset">Перезапустить</button>
    </div>

    <p class="hint">Управляйте с помощью стрелок на клавиатуре или свайпами на экране</p>
  </main>

  <script>
    // Настройки сетки
    const CELL_SIZE = 70;
    const GAP = 12;
    const gridContainer = document.getElementById('grid-container');
    const currentScoreEl = document.getElementById('current-score');
    const bestScoreEl = document.getElementById('best-score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');
    const resetBtn = document.getElementById('reset-btn');
    const restartBtnOver = document.getElementById('restart-btn-over');

    // Состояние игры
    let grid = [
      [null, null, null, null],
      [null, null, null, null],
      [null, null, null, null],
      [null, null, null, null]
    ];
    let score = 0;
    let bestScore = localStorage.getItem('bestScore2048') ? parseInt(localStorage.getItem('bestScore2048')) : 0;
    let isGameOverState = false;
    let audioCtx = null;

    bestScoreEl.textContent = bestScore;

    // Векторы направлений перемещения
    const VECTORS = {
      'ArrowUp':    { x: 0, y: -1 },
      'ArrowDown':  { x: 0, y: 1 },
      'ArrowLeft':  { x: -1, y: 0 },
      'ArrowRight': { x: 1, y: 0 }
    };

    // Класс плитки (Tile)
    class Tile {
      static nextId = 0;

      constructor(row, col, value) {
        this.row = row;
        this.col = col;
        this.value = value;
        this.id = Tile.nextId++;
        this.mergedFrom = null; // Флаг слияния с другой плиткой
        this.element = this.createElement();
      }

      createElement() {
        const div = document.createElement('div');
        div.className = `tile tile-${this.value}`;
        div.id = `tile-${this.id}`;
        div.innerHTML = `
          <div class="tile-inner">
            <div class="tile-face tile-front">${this.value}</div>
            <div class="tile-face tile-back"></div>
            <div class="tile-face tile-top"></div>
            <div class="tile-face tile-bottom"></div>
            <div class="tile-face tile-left"></div>
            <div class="tile-face tile-right"></div>
          </div>
        `;
        this.updatePosition();
        return div;
      }

      updatePosition() {
        // Вычисляем координаты X и Y с учетом зазора
        const x = GAP + this.col * (CELL_SIZE + GAP);
        const y = GAP + this.row * (CELL_SIZE + GAP);
        this.element.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }

      updateValue(newValue) {
        this.value = newValue;
        this.element.className = `tile tile-${newValue}`;
        
        // Обновляем текст лицевой стороны
        const front = this.element.querySelector('.tile-front');
        front.textContent = newValue;
        
        // Запуск 3D-анимации пульсации при слиянии
        const inner = this.element.querySelector('.tile-inner');
        inner.classList.remove('tile-merge-pulse');
        void inner.offsetWidth; // Триггер перерисовки
        inner.classList.add('tile-merge-pulse');
      }

      destroy() {
        this.element.remove();
      }
    }

    // Инициализация фоновой сетки (пустые ячейки)
    function buildGridBackground() {
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          const x = GAP + c * (CELL_SIZE + GAP);
          const y = GAP + r * (CELL_SIZE + GAP);
          cell.style.transform = `translate3d(${x}px, ${y}px, 0)`;
          gridContainer.appendChild(cell);
        }
      }
    }

    // Воспроизведение звуков
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSlideSound() {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.12);
        
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch (e) {}
    }

    function playMergeSound(value) {
      try {
        initAudio();
        const now = audioCtx.currentTime;
        // Тональность зависит от значения плитки
        const power = Math.log2(value);
        const baseFreq = 220 * Math.pow(1.059463, power * 2);
        
        [baseFreq, baseFreq * 1.5].forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + idx * 0.04);
          
          gain.gain.setValueAtTime(0.08, now + idx * 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.04 + 0.25);
          
          osc.start(now + idx * 0.04);
          osc.stop(now + idx * 0.04 + 0.25);
        });
      } catch (e) {}
    }

    function playResetSound() {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.35);
        
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
      } catch (e) {}
    }

    function playGameOverSound() {
      try {
        initAudio();
        const now = audioCtx.currentTime;
        const notes = [350, 280, 220, 160];
        
        notes.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + idx * 0.15);
          
          gain.gain.setValueAtTime(0.06, now + idx * 0.15);
          gain.gain.linearRampToValueAtTime(0.001, now + idx * 0.15 + 0.3);
          
          osc.start(now + idx * 0.15);
          osc.stop(now + idx * 0.15 + 0.3);
        });
      } catch (e) {}
    }

    // Спавн случайной плитки (2 или 4)
    function spawnRandomTile() {
      const empties = [];
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (!grid[r][c]) {
            empties.push({ r, c });
          }
        }
      }

      if (empties.length > 0) {
        const { r, c } = empties[Math.floor(Math.random() * empties.length)];
        const val = Math.random() < 0.9 ? 2 : 4;
        const tile = new Tile(r, c, val);
        grid[r][c] = tile;
        gridContainer.appendChild(tile.element);
      }
    }

    // Очистка флагов слияния перед ходом
    function prepareTilesForMove() {
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (grid[r][c]) {
            grid[r][c].mergedFrom = null;
          }
        }
      }
    }

    // Проверка попадания координат в границы поля
    function inBounds(cell) {
      return cell.r >= 0 && cell.r < 4 && cell.c >= 0 && cell.c < 4;
    }

    // Поиск самой дальней свободной ячейки по вектору движения
    function findFarthestPosition(cell, vector) {
      let previous;
      let next = { r: cell.r, c: cell.c };

      do {
        previous = next;
        next = { r: previous.r + vector.y, c: previous.c + vector.x };
      } while (inBounds(next) && !grid[next.r][next.c]);

      return {
        furthest: previous,
        next: inBounds(next) ? next : null
      };
    }

    // Генерация обхода ячеек (зависит от направления вектора)
    function getTraversals(vector) {
      let x = [0, 1, 2, 3];
      let y = [0, 1, 2, 3];
      
      if (vector.x === 1) x.reverse(); // Вправо
      if (vector.y === 1) y.reverse(); // Вниз
      
      return { x, y };
    }

    // Игровой ход плиток
    function move(direction) {
      const vector = VECTORS[direction];
      if (!vector || isGameOverState) return;

      const traversals = getTraversals(vector);
      let moved = false;

      prepareTilesForMove();

      traversals.y.forEach(r => {
        traversals.x.forEach(c => {
          const tile = grid[r][c];
          if (tile) {
            const { next, furthest } = findFarthestPosition({ r, c }, vector);

            // Проверка слияния с плиткой, стоящей следом
            if (next && grid[next.r][next.c] && !grid[next.r][next.c].mergedFrom && grid[next.r][next.c].value === tile.value) {
              const targetTile = grid[next.r][next.c];
              
              // Перемещаем слияемую плитку на координаты цели
              tile.row = next.r;
              tile.col = next.c;
              tile.updatePosition();
              
              // Помечаем цель о слиянии с текущей
              targetTile.mergedFrom = tile;
              
              // Освобождаем старое место
              grid[r][c] = null;
              grid[next.r][next.c] = targetTile;
              
              // Удваиваем номинал целевой плитки после завершения скольжения
              const newVal = targetTile.value * 2;
              setTimeout(() => {
                targetTile.updateValue(newVal);
                tile.destroy();
              }, 150);

              score += newVal;
              updateScore();
              playMergeSound(newVal);
              moved = true;
            } else {
              // Обычный сдвиг плитки
              if (furthest.r !== r || furthest.c !== c) {
                grid[r][c] = null;
                grid[furthest.r][furthest.c] = tile;
                tile.row = furthest.r;
                tile.col = furthest.c;
                tile.updatePosition();
                moved = true;
              }
            }
          }
        });
      });

      if (moved) {
        playSlideSound();
        spawnRandomTile();
        if (isGameOver()) {
          showGameOver();
        }
      }
    }

    // Проверка возможности ходов (Game Over)
    function isGameOver() {
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          if (grid[r][c] === null) return false;
        }
      }

      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
          if (grid[r][c].value === grid[r][c + 1].value) return false;
        }
      }

      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 4; c++) {
          if (grid[r][c].value === grid[r + 1][c].value) return false;
        }
      }

      return true;
    }

    // Отображение Game Over
    function showGameOver() {
      isGameOverState = true;
      finalScoreEl.textContent = score;
      gameOverScreen.classList.remove('hidden');
      playGameOverSound();
    }

    // Перезапуск игры
    function restartGame() {
      const tiles = gridContainer.querySelectorAll('.tile');
      tiles.forEach(t => t.remove());

      grid = [
        [null, null, null, null],
        [null, null, null, null],
        [null, null, null, null],
        [null, null, null, null]
      ];
      score = 0;
      updateScore();
      gameOverScreen.classList.add('hidden');
      isGameOverState = false;

      spawnRandomTile();
      spawnRandomTile();
      playResetSound();
    }

    // Обновление интерфейса счета
    function updateScore() {
      currentScoreEl.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('bestScore2048', bestScore);
        bestScoreEl.textContent = bestScore;
      }
    }

    // --- Управление клавиатурой ---
    window.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault(); // Запрещаем прокрутку страницы клавишами
        move(e.key);
      }
    });

    // --- Мобильное управление (Свайпы) ---
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (isGameOverState) return;

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;

      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;

      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      const threshold = 40; // Минимальная длина свайпа в пикселях

      if (Math.max(absDx, absDy) > threshold) {
        if (absDx > absDy) {
          // Горизонтальный свайп
          if (dx > 0) move('ArrowRight');
          else move('ArrowLeft');
        } else {
          // Вертикальный свайп
          if (dy > 0) move('ArrowDown');
          else move('ArrowUp');
        }
      }
    }, { passive: true });

    // --- Интерактивный 3D-наклон поля от курсора ---
    document.addEventListener('mousemove', (e) => {
      const rect = gridContainer.getBoundingClientRect();
      const boardCenterX = rect.left + rect.width / 2;
      const boardCenterY = rect.top + rect.height / 2;
      
      const mouseX = e.clientX - boardCenterX;
      const mouseY = e.clientY - boardCenterY;
      
      const distance = Math.sqrt(mouseX * mouseX + mouseY * mouseY);
      const maxDistance = 600; // Дистанция взаимодействия
      
      if (distance < maxDistance) {
        const factor = (maxDistance - distance) / maxDistance;
        // Базовые углы: rotateX(20deg) rotateY(-12deg)
        // Добавляем отклонение на угол до 16 градусов в зависимости от положения мыши
        const rotateX = 20 - (mouseY / rect.height) * 18 * factor;
        const rotateY = -12 + (mouseX / rect.width) * 18 * factor;
        
        gridContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      } else {
        gridContainer.style.transform = 'perspective(1000px) rotateX(20deg) rotateY(-12deg)';
      }
    });

    document.addEventListener('mouseleave', () => {
      gridContainer.style.transform = 'perspective(1000px) rotateX(20deg) rotateY(-12deg)';
    });

    // Обработчики кнопок перезапуска
    resetBtn.addEventListener('click', restartGame);
    restartBtnOver.addEventListener('click', restartGame);

    // Запуск игры
    buildGridBackground();
    restartGame();
  </script>
</body>
</html>
