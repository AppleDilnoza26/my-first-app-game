<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Интерактивная игра в шашки с 3D эффектами, эффектами частиц при взятии и звуковым сопровождением.">
  <title>Космические Шашки 3D</title>
  
  <!-- Подключение шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #030308;
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.06);
      
      --player1-color: #ff007f;
      --player1-glow: rgba(255, 0, 127, 0.4);
      --player1-grad: linear-gradient(135deg, #ff007f, #ff0000);
      
      --player2-color: #00f0ff;
      --player2-glow: rgba(0, 240, 255, 0.4);
      --player2-grad: linear-gradient(135deg, #00f0ff, #0072ff);
      
      --text-main: #ffffff;
      --text-muted: #7e8299;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      perspective: 1200px;
      position: relative;
    }

    /* Декоративный космический фон */
    .bg-glow-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--player1-glow) 0%, rgba(0,0,0,0) 70%);
      top: -15%;
      left: -10%;
      z-index: 1;
      filter: blur(60px);
      animation: float 25s infinite alternate;
    }

    .bg-glow-2 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--player2-glow) 0%, rgba(0,0,0,0) 70%);
      bottom: -20%;
      right: -10%;
      z-index: 1;
      filter: blur(60px);
      animation: float 30s infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.05); }
    }

    /* Главная карточка игры */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 25px;
      width: 95%;
      max-width: 470px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      z-index: 10;
      transform-style: preserve-3d;
      transform: perspective(1000px);
      margin: 20px auto;
    }

    /* Шапка игры */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      transform-style: preserve-3d;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--player2-color), var(--player1-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transform: translateZ(30px);
      text-transform: uppercase;
    }

    /* Индикатор текущего хода */
    .turn-status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 6px 14px;
      transform: translateZ(30px);
    }

    .turn-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--player2-color);
      box-shadow: 0 0 10px var(--player2-color);
      transition: all 0.3s ease;
    }

    .turn-dot.player1 {
      background: var(--player1-color);
      box-shadow: 0 0 10px var(--player1-color);
    }

    .turn-text {
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* Панель счета (оставшиеся шашки) */
    .scoreboard {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      transform: translateZ(25px);
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .score-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .score-marker.p1 { background: var(--player1-color); box-shadow: 0 0 8px var(--player1-color); }
    .score-marker.p2 { background: var(--player2-color); box-shadow: 0 0 8px var(--player2-color); }

    /* 3D Игровая сцена */
    .arena-3d {
      width: 100%;
      perspective: 1000px;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      transform-style: preserve-3d;
    }

    /* Рама игрового поля с разметкой */
    #board-frame {
      position: relative;
      width: 400px;
      height: 400px;
      background: rgba(10, 10, 18, 0.7);
      border: 16px solid rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7),
                  inset 0 0 15px rgba(0, 0, 0, 0.6);
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(24deg) rotateY(0deg);
      transition: transform 0.15s ease-out;
    }

    /* Сетка игрового поля */
    #grid-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 368px; /* 8 * 46px */
      height: 368px;
      transform-style: preserve-3d;
    }

    /* Ячейки доски */
    .cell {
      position: absolute;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    /* Темные и светлые клетки */
    .cell.dark {
      background: rgba(15, 15, 30, 0.6);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.6);
    }
    
    .cell.light {
      background: rgba(255, 255, 255, 0.02);
    }

    /* Подсветка доступных ходов */
    .cell-highlight {
      position: absolute;
      width: 38px;
      height: 38px;
      border: 2px dashed rgba(0, 255, 170, 0.6);
      border-radius: 50%;
      background: rgba(0, 255, 170, 0.05);
      cursor: pointer;
      transform: translateZ(2px);
      box-shadow: 0 0 8px rgba(0, 255, 170, 0.3);
      transition: all 0.2s ease;
    }

    .cell-highlight:hover {
      background: rgba(0, 255, 170, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 170, 0.6);
      transform: translateZ(5px);
    }

    .cell-highlight.is-jump {
      border-color: rgba(255, 100, 0, 0.7);
      background: rgba(255, 100, 0, 0.05);
      box-shadow: 0 0 8px rgba(255, 100, 0, 0.3);
    }

    .cell-highlight.is-jump:hover {
      background: rgba(255, 100, 0, 0.15);
      box-shadow: 0 0 15px rgba(255, 100, 0, 0.6);
    }

    /* Подписи координат (A-H, 1-8) */
    .board-label {
      position: absolute;
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.2);
      font-family: 'Space Grotesk', sans-serif;
      pointer-events: none;
    }

    /* 3D Шашки (Цилиндры) */
    .piece {
      position: absolute;
      width: 36px;
      height: 36px;
      transform-style: preserve-3d;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .piece-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: spawn 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes spawn {
      0% { transform: scale3d(0, 0, 0); }
      100% { transform: scale3d(1, 1, 1); }
    }

    /* Слои для создания 3D-высоты (Цилиндр) */
    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      border: 1px solid rgba(0, 0, 0, 0.45);
      box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.12);
    }

    /* 3D Стек слоев */
    .layer-1 { transform: translateZ(0px); filter: brightness(0.4); }
    .layer-2 { transform: translateZ(2px); filter: brightness(0.5); }
    .layer-3 { transform: translateZ(4px); filter: brightness(0.6); }
    .layer-4 { transform: translateZ(6px); filter: brightness(0.8); }
    .layer-5 {
      transform: translateZ(8px);
      filter: brightness(1.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Специфические цвета игроков */
    .player-1 {
      background: var(--player1-grad);
      color: var(--player1-color);
    }

    .player-2 {
      background: var(--player2-grad);
      color: var(--player2-color);
    }

    /* Выбранная активная шашка */
    .piece.selected {
      transform: translateZ(16px) scale(1.05);
      filter: drop-shadow(0 0 12px currentColor);
    }

    /* Шашка-Дамка (King) */
    .piece.is-king .layer-5 { transform: translateZ(8px); filter: brightness(0.8); }
    .piece.is-king .layer-6 { transform: translateZ(10px); filter: brightness(0.9); }
    .piece.is-king .layer-7 { transform: translateZ(12px); filter: brightness(1.0); }
    .piece.is-king .layer-8 {
      transform: translateZ(14px);
      filter: brightness(1.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Иконка короны для Дамки */
    .crown-icon {
      width: 16px;
      height: 16px;
      background: gold;
      clip-path: polygon(0% 100%, 100% 100%, 100% 20%, 80% 50%, 50% 10%, 20% 50%, 0% 20%);
      filter: drop-shadow(0 0 2px rgba(255, 215, 0, 0.8));
      animation: spin-crown 4s linear infinite;
    }

    @keyframes spin-crown {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Управление */
    .controls {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      transform: translateZ(20px);
    }

    .btn-reset {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      width: 100%;
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.02);
    }

    .btn-reset:active {
      transform: scale(0.98);
    }

    /* Оверлей окончания игры */
    #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 10, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transform: translateZ(50px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hidden {
      display: none !important;
    }

    #game-over-screen h2 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--player2-color), var(--player1-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    #game-over-screen p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    #game-over-screen .btn-restart {
      background: linear-gradient(135deg, var(--player2-color), var(--player1-color));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3);
      transition: all 0.2s ease;
    }

    #game-over-screen .btn-restart:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 240, 255, 0.5);
    }

    /* Холст эффектов частиц при взятии фигуры */
    canvas#particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

  <!-- Космическое свечение фона -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Canvas для взрывов съеденных шашек -->
  <canvas id="particles"></canvas>

  <main class="game-card">
    <div class="game-header">
      <h1 id="app-title">Шашки 3D</h1>
      <div class="turn-status">
        <div id="turn-dot" class="turn-dot"></div>
        <span id="turn-text" class="turn-text">Ход: Синие</span>
      </div>
    </div>

    <!-- Статистика оставшихся шашек -->
    <div class="scoreboard">
      <div class="score-item">
        <span class="score-marker p2"></span>
        <span>Синие: <span id="p2-count">12</span></span>
      </div>
      <div class="score-item">
        <span class="score-marker p1"></span>
        <span>Красные: <span id="p1-count">12</span></span>
      </div>
    </div>

    <!-- Арена 3D с доской -->
    <div class="arena-3d">
      <div id="board-frame">
        <!-- Экран окончания игры -->
        <div id="game-over-screen" class="hidden">
          <h2 id="winner-text">Игра Окончена</h2>
          <p>Поздравляем с победой!</p>
          <button id="restart-btn-over" class="btn-restart">Играть снова</button>
        </div>
        
        <!-- Сетка и шашки -->
        <div id="grid-container"></div>
      </div>
    </div>

    <div class="controls">
      <button id="reset-btn" class="btn-reset">Начать заново</button>
    </div>
  </main>

  <script>
    // Настройки интерфейса
    const CELL_SIZE = 46;
    const gridContainer = document.getElementById('grid-container');
    const boardFrame = document.getElementById('board-frame');
    const turnDot = document.getElementById('turn-dot');
    const turnText = document.getElementById('turn-text');
    const p1CountEl = document.getElementById('p1-count');
    const p2CountEl = document.getElementById('p2-count');
    const resetBtn = document.getElementById('reset-btn');
    const restartBtnOver = document.getElementById('restart-btn-over');
    const gameOverScreen = document.getElementById('game-over-screen');
    const winnerText = document.getElementById('winner-text');
    
    // Canvas частиц
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    // Состояние игры
    // 0: пустая, 1: Красный игрок (ходит вниз), 2: Синий игрок (ходит вверх)
    let board = [];
    let turn = 2; // Синие ходят первыми
    let selectedPiece = null; // { r, c }
    let validMoves = []; // Список допустимых ходов для выбранной шашки
    let activeJumpingPiece = null; // { r, c } - если совершается цепочечное взятие (мульти-прыжок)
    let isGameOverState = false;
    let audioCtx = null;
    let particles = [];

    // Настройка размеров холста
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Аудиоэффекты
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSelectSound() {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(550, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } catch (e) {}
    }

    function playMoveSound() {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(240, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.14);
        
        gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.14);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.14);
      } catch (e) {}
    }

    function playCaptureSound() {
      try {
        initAudio();
        const now = audioCtx.currentTime;
        
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(90, now);
        osc1.frequency.linearRampToValueAtTime(30, now + 0.22);
        gain1.gain.setValueAtTime(0.12, now);
        gain1.gain.linearRampToValueAtTime(0.001, now + 0.22);
        osc1.start();
        osc1.stop(now + 0.22);
        
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(260, now + 0.04);
        osc2.frequency.exponentialRampToValueAtTime(520, now + 0.22);
        gain2.gain.setValueAtTime(0.07, now + 0.04);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
        osc2.start(now + 0.04);
        osc2.stop(now + 0.22);
      } catch (e) {}
    }

    function playKingSound() {
      try {
        initAudio();
        const now = audioCtx.currentTime;
        const notes = [261.63, 329.63, 392.00, 523.25]; // Аккорд до-мажор
        notes.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + idx * 0.07);
          gain.gain.setValueAtTime(0.07, now + idx * 0.07);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.07 + 0.25);
          osc.start(now + idx * 0.07);
          osc.stop(now + idx * 0.07 + 0.25);
        });
      } catch (e) {}
    }

    function playWinSound() {
      try {
        initAudio();
        const now = audioCtx.currentTime;
        const melody = [261.63, 329.63, 392.00, 523.25, 392.00, 523.25, 659.25];
        melody.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + idx * 0.12);
          gain.gain.setValueAtTime(0.08, now + idx * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.12 + 0.3);
          osc.start(now + idx * 0.12);
          osc.stop(now + idx * 0.12 + 0.3);
        });
      } catch (e) {}
    }

    // Класс 3D-частиц для разлета шашек при съедании
    class Spark {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.z = 0;
        
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - (Math.random() * 2 + 1);
        this.vz = (Math.random() - 0.5) * 8;
        
        this.gravity = 0.15;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
        this.size = Math.random() * 6 + 3;
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.z += this.vz;
        this.vy += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        const fov = 350;
        const scale = fov / (fov + this.z);
        if (scale <= 0) return;
        
        const size = this.size * scale;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.shadowBlur = 10 * scale;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 20; i++) {
        particles.push(new Spark(x, y, color));
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw();
        if (p.alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Инициализация координат рамы
    function buildBoardLabels() {
      const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
      
      // Горизонтальные подписи (сверху и снизу)
      for (let i = 0; i < 8; i++) {
        const xPos = 16 + i * CELL_SIZE + CELL_SIZE / 2;
        
        // Сверху
        const labelTop = document.createElement('span');
        labelTop.className = 'board-label';
        labelTop.textContent = letters[i];
        labelTop.style.top = '2px';
        labelTop.style.left = `${xPos}px`;
        labelTop.style.transform = 'translateX(-50%) translateZ(1px)';
        boardFrame.appendChild(labelTop);
        
        // Снизу
        const labelBottom = document.createElement('span');
        labelBottom.className = 'board-label';
        labelBottom.textContent = letters[i];
        labelBottom.style.bottom = '2px';
        labelBottom.style.left = `${xPos}px`;
        labelBottom.style.transform = 'translateX(-50%) translateZ(1px)';
        boardFrame.appendChild(labelBottom);
      }

      // Вертикальные подписи (слева и справа)
      for (let i = 0; i < 8; i++) {
        const yPos = 16 + i * CELL_SIZE + CELL_SIZE / 2;
        const numberVal = 8 - i;
        
        // Слева
        const labelLeft = document.createElement('span');
        labelLeft.className = 'board-label';
        labelLeft.textContent = numberVal;
        labelLeft.style.left = '4px';
        labelLeft.style.top = `${yPos}px`;
        labelLeft.style.transform = 'translateY(-50%) translateZ(1px)';
        boardFrame.appendChild(labelLeft);
        
        // Справа
        const labelRight = document.createElement('span');
        labelRight.className = 'board-label';
        labelRight.textContent = numberVal;
        labelRight.style.right = '4px';
        labelRight.style.top = `${yPos}px`;
        labelRight.style.transform = 'translateY(-50%) translateZ(1px)';
        boardFrame.appendChild(labelRight);
      }
    }

    // Инициализация сетки и расстановка шашек
    function initGame() {
      // Инициализируем массив 8x8
      board = Array(8).fill(null).map(() => Array(8).fill(null));

      // Расставляем шашки
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          if ((r + c) % 2 === 1) {
            if (r < 3) {
              board[r][c] = { player: 1, isKing: false }; // Игрок 1 (Красные)
            } else if (r > 4) {
              board[r][c] = { player: 2, isKing: false }; // Игрок 2 (Синие)
            }
          }
        }
      }

      // Сбрасываем переменные состояния
      turn = 2;
      selectedPiece = null;
      validMoves = [];
      activeJumpingPiece = null;
      isGameOverState = false;
      
      gameOverScreen.classList.add('hidden');
      updateTurnIndicator();
      renderBoard();
      
      // Звук старта
      if (audioCtx) playWinSound();
    }

    // Проверка попадания в рамки доски
    function inBounds(r, c) {
      return r >= 0 && r < 8 && c >= 0 && c < 8;
    }

    // Получить все доступные взятия (прыжки) для игрока
    function getPlayerJumps(player) {
      let jumps = [];
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = board[r][c];
          if (piece && piece.player === player) {
            const pieceMoves = getPieceMoves(r, c);
            const pieceJumps = pieceMoves.filter(m => m.isJump);
            jumps.push(...pieceJumps);
          }
        }
      }
      return jumps;
    }

    // Получить ходы для конкретной фигуры
    function getPieceMoves(r, c) {
      const piece = board[r][c];
      if (!piece) return [];

      const moves = [];
      
      // Направления движения
      let directions = [];
      if (piece.isKing) {
        directions = [
          { dr: -1, dc: -1 }, { dr: -1, dc: 1 },
          { dr: 1, dc: -1 }, { dr: 1, dc: 1 }
        ];
      } else {
        if (piece.player === 1) {
          directions = [{ dr: 1, dc: -1 }, { dr: 1, dc: 1 }]; // Красные вниз
        } else {
          directions = [{ dr: -1, dc: -1 }, { dr: -1, dc: 1 }]; // Синие вверх
        }
      }

      // Всегда проверяем прыжки (взятия) во все 4 направления для всех фигур
      const jumpDirections = [
        { dr: -1, dc: -1 }, { dr: -1, dc: 1 },
        { dr: 1, dc: -1 }, { dr: 1, dc: 1 }
      ];

      // 1. Поиск прыжков
      jumpDirections.forEach(d => {
        const midRow = r + d.dr;
        const midCol = c + d.dc;
        const targetRow = r + d.dr * 2;
        const targetCol = c + d.dc * 2;

        if (inBounds(midRow, midCol) && inBounds(targetRow, targetCol)) {
          const midPiece = board[midRow][midCol];
          const targetPiece = board[targetRow][targetCol];

          if (midPiece && midPiece.player !== piece.player && !targetPiece) {
            moves.push({
              from: { r, c },
              to: { r: targetRow, c: targetCol },
              isJump: true,
              captured: { r: midRow, c: midCol }
            });
          }
        }
      });

      // Если нашли прыжки, возвращаем их (так как взятие обязательно)
      if (moves.length > 0) return moves;

      // 2. Обычные ходы (только если нет обязательных взятий)
      directions.forEach(d => {
        const targetRow = r + d.dr;
        const targetCol = c + d.dc;

        if (inBounds(targetRow, targetCol) && !board[targetRow][targetCol]) {
          moves.push({
            from: { r, c },
            to: { r: targetRow, c: targetCol },
            isJump: false
          });
        }
      });

      return moves;
    }

    // Выбор фигуры
    function selectPiece(r, c) {
      if (isGameOverState) return;
      
      const piece = board[r][c];
      if (!piece || piece.player !== turn) return;

      // Если сейчас идет цепочка прыжков, можно двигать только текущую прыгающую фигуру
      if (activeJumpingPiece && (activeJumpingPiece.r !== r || activeJumpingPiece.c !== c)) {
        return;
      }

      // Проверка обязательности взятий у других фигур игрока
      const allJumps = getPlayerJumps(turn);
      const pieceMoves = getPieceMoves(r, c);
      
      if (allJumps.length > 0) {
        // У игрока есть взятие, фигура должна иметь ход со взятием
        const pieceJumps = pieceMoves.filter(m => m.isJump);
        if (pieceJumps.length === 0) {
          // Нельзя выбрать эту фигуру, так как другие должны рубить
          return;
        }
        validMoves = pieceJumps;
      } else {
        // Взятий нет, любые ходы доступны
        validMoves = pieceMoves;
      }

      selectedPiece = { r, c };
      playSelectSound();
      renderBoard();
    }

    // Выполнение хода
    function executeMove(move) {
      const { from, to, isJump, captured } = move;

      // Перемещаем фигуру
      board[to.r][to.c] = board[from.r][from.c];
      board[from.r][from.c] = null;

      let anotherJumpAvailable = false;

      if (isJump) {
        // Берем координаты съеденной фигуры для анимации взрыва
        const capturedEl = document.querySelector(`[data-row="${captured.r}"][data-col="${captured.c}"]`);
        if (capturedEl) {
          const rect = capturedEl.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          const color = board[to.r][to.c].player === 1 ? '#00f0ff' : '#ff007f'; // Цвет съедаемой шашки
          createExplosion(x, y, color);
        }

        // Удаляем съеденную фигуру
        board[captured.r][captured.c] = null;
        playCaptureSound();

        // Проверяем, может ли та же фигура рубить дальше (мульти-прыжок)
        // Но сперва проверим, стала ли она дамкой. При промоушене ход в русских шашках может продолжаться,
        // но по классическим правилам международных/английских шашек ход на дамке-промоушене сразу останавливается.
        const reachedEnd = (board[to.r][to.c].player === 1 && to.r === 7) || (board[to.r][to.c].player === 2 && to.r === 0);
        let promotedJustNow = false;

        if (reachedEnd && !board[to.r][to.c].isKing) {
          board[to.r][to.c].isKing = true;
          promotedJustNow = true;
          playKingSound();
        }

        if (!promotedJustNow) {
          const nextJumps = getPieceMoves(to.r, to.c).filter(m => m.isJump);
          if (nextJumps.length > 0) {
            anotherJumpAvailable = true;
            activeJumpingPiece = { r: to.r, c: to.c };
            selectedPiece = { r: to.r, c: to.c };
            validMoves = nextJumps;
          }
        }
      } else {
        playMoveSound();
      }

      if (!anotherJumpAvailable) {
        // Если обычный ход привел к противоположному концу поля - промоушен
        const reachedEnd = (board[to.r][to.c].player === 1 && to.r === 7) || (board[to.r][to.c].player === 2 && to.r === 0);
        if (reachedEnd && !board[to.r][to.c].isKing) {
          board[to.r][to.c].isKing = true;
          playKingSound();
        }

        // Передаем ход
        turn = turn === 1 ? 2 : 1;
        selectedPiece = null;
        validMoves = [];
        activeJumpingPiece = null;
        
        updateTurnIndicator();

        // Проверка победы / отсутствия ходов
        checkGameStatus();
      }

      renderBoard();
    }

    // Проверка условий победы/проигрыша
    function checkGameStatus() {
      let p1HasPieces = false;
      let p2HasPieces = false;
      let p1HasMoves = false;
      let p2HasMoves = false;

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = board[r][c];
          if (piece) {
            if (piece.player === 1) {
              p1HasPieces = true;
              if (getPieceMoves(r, c).length > 0) p1HasMoves = true;
            } else {
              p2HasPieces = true;
              if (getPieceMoves(r, c).length > 0) p2HasMoves = true;
            }
          }
        }
      }

      if (!p1HasPieces || (turn === 1 && !p1HasMoves)) {
        showWinner(2); // Синие победили
      } else if (!p2HasPieces || (turn === 2 && !p2HasMoves)) {
        showWinner(1); // Красные победили
      }
    }

    function showWinner(player) {
      isGameOverState = true;
      winnerText.textContent = player === 2 ? 'Синие Победили!' : 'Красные Победили!';
      winnerText.style.background = player === 2 ? 'linear-gradient(135deg, var(--player2-color), #fff)' : 'linear-gradient(135deg, var(--player1-color), #fff)';
      winnerText.style.webkitBackgroundClip = 'text';
      gameOverScreen.classList.remove('hidden');
      playWinSound();
    }

    // Обновление индикатора хода
    function updateTurnIndicator() {
      if (turn === 1) {
        turnDot.className = 'turn-dot player1';
        turnText.textContent = 'Ход: Красные';
      } else {
        turnDot.className = 'turn-dot';
        turnText.textContent = 'Ход: Синие';
      }
    }

    // Подсчет и вывод количества шашек
    function updateScores() {
      let p1Count = 0;
      let p2Count = 0;
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const piece = board[r][c];
          if (piece) {
            if (piece.player === 1) p1Count++;
            else p2Count++;
          }
        }
      }
      p1CountEl.textContent = p1Count;
      p2CountEl.textContent = p2Count;
    }

    // Отрисовка игрового поля
    function renderBoard() {
      gridContainer.innerHTML = '';
      updateScores();

      // Отрисовка всех клеток доски
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const cell = document.createElement('div');
          cell.className = `cell ${(r + c) % 2 === 1 ? 'dark' : 'light'}`;
          cell.dataset.row = r;
          cell.dataset.col = c;
          
          const x = c * CELL_SIZE;
          const y = r * CELL_SIZE;
          cell.style.transform = `translate3d(${x}px, ${y}px, 0)`;
          gridContainer.appendChild(cell);

          const piece = board[r][c];
          if (piece) {
            // Создание 3D шашки
            const pieceDiv = document.createElement('div');
            pieceDiv.className = `piece player-${piece.player}`;
            if (piece.isKing) pieceDiv.classList.add('is-king');
            
            // Если шашка выбрана игроком
            if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) {
              pieceDiv.classList.add('selected');
            }

            // Рендеринг 3D слоев шашки
            let layersCount = piece.isKing ? 8 : 5;
            let pieceHtml = `<div class="piece-inner">`;
            for (let l = 1; l <= layersCount; l++) {
              pieceHtml += `<div class="layer layer-${l}">`;
              if (l === layersCount) {
                if (piece.isKing) {
                  pieceHtml += `<div class="crown-icon"></div>`;
                }
              }
              pieceHtml += `</div>`;
            }
            pieceHtml += `</div>`;
            pieceDiv.innerHTML = pieceHtml;

            // Центрируем внутри клетки
            pieceDiv.style.left = '5px';
            pieceDiv.style.top = '5px';

            pieceDiv.addEventListener('click', (e) => {
              e.stopPropagation();
              selectPiece(r, c);
            });

            cell.appendChild(pieceDiv);
          }
        }
      }

      // Отрисовка подсветок возможных ходов
      if (selectedPiece && validMoves.length > 0) {
        validMoves.forEach(move => {
          const targetCell = gridContainer.querySelector(`[data-row="${move.to.r}"][data-col="${move.to.c}"]`);
          if (targetCell) {
            const highlight = document.createElement('div');
            highlight.className = `cell-highlight ${move.isJump ? 'is-jump' : ''}`;
            
            highlight.addEventListener('click', (e) => {
              e.stopPropagation();
              executeMove(move);
            });
            
            targetCell.appendChild(highlight);
          }
        });
      }
    }

    // --- Интерактивный 3D наклон доски с мышкой ---
    document.addEventListener('mousemove', (e) => {
      const rect = boardFrame.getBoundingClientRect();
      const boardCenterX = rect.left + rect.width / 2;
      const boardCenterY = rect.top + rect.height / 2;
      
      const mouseX = e.clientX - boardCenterX;
      const mouseY = e.clientY - boardCenterY;
      
      const distance = Math.sqrt(mouseX * mouseX + mouseY * mouseY);
      const maxDistance = 750;
      
      if (distance < maxDistance) {
        const factor = (maxDistance - distance) / maxDistance;
        // Базовые углы: rotateX(24deg)
        const rotateX = 24 - (mouseY / rect.height) * 16 * factor;
        const rotateY = (mouseX / rect.width) * 16 * factor;
        
        boardFrame.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      } else {
        boardFrame.style.transform = 'perspective(1000px) rotateX(24deg) rotateY(0deg)';
      }
    });

    document.addEventListener('mouseleave', () => {
      boardFrame.style.transform = 'perspective(1000px) rotateX(24deg) rotateY(0deg)';
    });

    // Обработчики кнопок
    resetBtn.addEventListener('click', initGame);
    restartBtnOver.addEventListener('click', initGame);

    // Запуск игры
    buildBoardLabels();
    initGame();
  </script>
</body>
